<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Dashboard</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header>
        <h1>DASHBOARD <span style="color:var(--accent)">MATH</span></h1>
    </header>

    <main id="category-selector">
        <div class="category-card" onclick="showSubcategories('factorization')">
            <h3>Παραγοντοποίηση</h3>
            <p>Επίλεξε μέθοδο</p>
        </div>
        <div class="category-card" onclick="showSubcategories('identities')">
            <h3>Ταυτότητες</h3>
            <p>Βασικά αναπτύγματα</p>
        </div>
    </main>

    <div id="subcategory-selector" class="hidden"></div>

    <section id="quiz-container" class="hidden">
        <div id="card-stack"></div>
        <button class="back-btn" onclick="window.location.reload()">BACK TO DASHBOARD</button>
    </section>

    <script src="assets/js/quiz.js"></script>
</body>
</html>
