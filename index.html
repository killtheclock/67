<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Quiz - Γ' Γυμνασίου</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header>
        <h1>Math Master <small>Γ' Γυμνασίου</small></h1>
        <p>Επίλεξε ενότητα</p>
    </header>

    <main id="category-selector">
        <div class="category-card" onclick="loadQuiz('factorization')">
            <span class="exercise-count">0 ασκήσεις</span>
            <div class="icon">^</div>
            <h2>Παραγοντοποίηση</h2>
        </div>
        <div class="category-card" onclick="loadQuiz('identities')">
            <span class="exercise-count">0 ασκήσεις</span>
            <div class="icon">ab</div>
            <h2>Ταυτότητες</h2>
        </div>
    </main>

    <section id="quiz-container" class="hidden">
        <div id="card-stack"></div>
        <center><button class="back-btn" onclick="window.location.reload()">Πίσω στις Ενότητες</button></center>
        <br>
    </section>

    <script src="assets/js/quiz.js"></script>
</body>
</html>
