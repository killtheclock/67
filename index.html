<!DOCTYPE html>
<html lang="el">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math OS v2.9</title>
    <link rel="stylesheet" href="assets/css/style.css?v=2.9">
</head>
<body>

            <p>DATA_SET_04 // Εξισώσεις</p>
        </div>
        <div class="category-card" onclick="showSubcategories('inequalities')">
            <h3>INEQUALITIES</h3>
            <p>DATA_SET_05 // Ανισώσεις</p>

    <div id="subcategory-selector" class="hidden"></div>

    <section id="quiz-container" class="hidden">
